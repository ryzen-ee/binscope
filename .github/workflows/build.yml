name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.0.0)'
        required: false
        type: string

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep -oP 'APP_VERSION\s+"[^"]+"' src/main.cpp | grep -oP '\d+\.\d+\.\d+')
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          fi
          echo "Using version: ${{ steps.version.outputs.VERSION }}"

  build:
    needs: get-version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: binscope-linux-x64
            output_name: pe
          - os: windows-latest
            artifact_name: binscope-windows-x64
            output_name: pe.exe
          - os: windows-latest
            artifact_name: binscope-windows-x86
            output_name: pe.exe
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y qtbase5-dev libqt5opengl5-dev libssl-dev build-essential cmake

      - name: Setup Conda for x64
        if: runner.os == 'Windows' && matrix.artifact_name == 'binscope-windows-x64'
        uses: conda-incubator/setup-miniconda@v2
        with:
          miniforge-version: latest
          activate-environment: qt

      - name: Install Chocolatey
        if: runner.os == 'Windows' && matrix.artifact_name == 'binscope-windows-x86'
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))

      - name: Install Qt x86
        if: runner.os == 'Windows' && matrix.artifact_name == 'binscope-windows-x86'
        run: |
          choco install qt5-default -y --forcex86

      - name: Install Qt via Conda
        if: runner.os == 'Windows' && matrix.artifact_name == 'binscope-windows-x64'
        shell: pwsh
        run: |
          conda install -c conda-forge qt=5.15 -y

      - name: Build on Linux
        if: runner.os == 'Linux'
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Build on Windows x64
        if: runner.os == 'Windows' && matrix.artifact_name == 'binscope-windows-x64'
        shell: pwsh
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=$env:CONDA_PREFIX
          cmake --build . --config Release

      - name: Build on Windows x86
        if: runner.os == 'Windows' && matrix.artifact_name == 'binscope-windows-x86'
        shell: pwsh
        run: |
          Write-Host "Checking Qt directory..."
          Get-ChildItem "C:/Qt/" -Recurse -Filter "gcc.exe" | Select-Object -First 5 FullName
          $qtdir = "C:/Qt/5.15.2/mingw87_32"
          if (Test-Path "$qtdir/mingw32/bin") {
            $env:PATH = "$qtdir/bin;$qtdir/mingw32/bin;$env:PATH"
          } else {
            Write-Host "mingw32/bin not found, checking for gcc..."
          }
          mkdir build
          cd build
          cmake .. -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=$qtdir
          mingw32-make -j4

      - name: Package Linux binary
        if: runner.os == 'Linux'
        run: |
          mkdir -p binscope-linux
          cp build/pe binscope-linux/binscope
          tar -czvf binscope-${{ needs.get-version.outputs.version }}-linux-x64.tar.gz binscope-linux/

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: binscope-${{ needs.get-version.outputs.version }}-linux-x64.tar.gz

      - name: Package Windows x64 binary
        if: runner.os == 'Windows' && matrix.artifact_name == 'binscope-windows-x64'
        shell: pwsh
        run: |
          mkdir -p binscope-windows-x64
          cp build/Release/${{ matrix.output_name }} binscope-windows-x64/
          Compress-Archive -Path binscope-windows-x64\* -DestinationPath binscope-${{ needs.get-version.outputs.version }}-windows-x64.zip

      - name: Package Windows x86 binary
        if: runner.os == 'Windows' && matrix.artifact_name == 'binscope-windows-x86'
        run: |
          mkdir -p binscope-windows-x86
          cp build/pe.exe binscope-windows-x86/
          tar -czvf binscope-${{ needs.get-version.outputs.version }}-windows-x86.tar.gz binscope-windows-x86/

      - name: Upload Windows x64 artifact
        if: runner.os == 'Windows' && matrix.artifact_name == 'binscope-windows-x64'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: binscope-${{ needs.get-version.outputs.version }}-windows-x64.zip

      - name: Upload Windows x86 artifact
        if: runner.os == 'Windows' && matrix.artifact_name == 'binscope-windows-x86'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: binscope-${{ needs.get-version.outputs.version }}-windows-x86.tar.gz

  release:
    needs: [get-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.get-version.outputs.version }}
          name: BinScope v${{ needs.get-version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/binscope-windows-x86/*.tar.gz
            artifacts/binscope-windows-x64/*.zip
            artifacts/binscope-linux-x64/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}