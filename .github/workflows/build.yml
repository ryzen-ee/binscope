name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.0.0)'
        required: false
        type: string

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep -oP 'APP_VERSION\s+"[^"]+"' src/main.cpp | grep -oP '\d+\.\d+\.\d+')
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          fi
          echo "Using version: ${{ steps.version.outputs.VERSION }}"

  build:
    needs: get-version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: binscope-linux-x64
            output_name: binscope
          - os: windows-latest
            artifact_name: binscope-windows-x64
            output_name: binscope.exe
            output_path: build/Release
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y qtbase5-dev libqt5opengl5-dev libssl-dev build-essential cmake

      - name: Setup Conda for Windows
        if: runner.os == 'Windows'
        uses: conda-incubator/setup-miniconda@v2
        with:
          miniforge-version: latest
          activate-environment: qt

      - name: Install Qt via Conda
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          conda install -c conda-forge qt=5.15 -y

      - name: Build on Linux
        if: runner.os == 'Linux'
        run: |
          rm -rf build
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          ls -la

      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=$env:CONDA_PREFIX
          cmake --build . --config Release
          Get-ChildItem . -Filter "*.exe" -Recurse

      - name: Package Linux binary
        if: runner.os == 'Linux'
        run: |
          ls -la build/
          mkdir -p binscope-linux
          # On Linux, the binary is just "binscope" without .exe
          if [ -f "build/binscope" ]; then
            cp build/binscope binscope-linux/binscope
          elif [ -f "build/binscope.exe" ]; then
            cp build/binscope.exe binscope-linux/binscope
          else
            ls build/ | head -20
            echo "ERROR: binscope not found"
          fi
          ls -la binscope-linux/
          tar -czvf binscope-${{ needs.get-version.outputs.version }}-linux-x64.tar.gz binscope-linux/

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: binscope-${{ needs.get-version.outputs.version }}-linux-x64.tar.gz

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Find the exe - it might be in build/bin or build/Release
          $exe = Get-ChildItem -Path build -Filter "binscope.exe" -Recurse | Select-Object -First 1
          if ($exe) {
            Write-Host "Found exe at: $($exe.FullName)"
            mkdir -p binscope-windows
            Copy-Item $exe.FullName binscope-windows/
          } else {
            Write-Host "ERROR: binscope.exe not found"
            Get-ChildItem build -Recurse -Filter "*.exe" | ForEach-Object { Write-Host $_.FullName }
          }
          # Copy Qt5 DLLs
          Get-ChildItem $env:CONDA_PREFIX -Filter "Qt5*.dll" -Recurse -File | Copy-Item -Destination binscope-windows/
          # Copy OpenSSL DLLs
          Get-ChildItem $env:CONDA_PREFIX -Filter "libcrypto*.dll" -Recurse -File | Copy-Item -Destination binscope-windows/
          Get-ChildItem $env:CONDA_PREFIX -Filter "libssl*.dll" -Recurse -File | Copy-Item -Destination binscope-windows/
          # Copy other Qt dependencies
          Get-ChildItem $env:CONDA_PREFIX -Filter "libpng*.dll" -Recurse -File | Copy-Item -Destination binscope-windows/
          Get-ChildItem $env:CONDA_PREFIX -Filter "zlib*.dll" -Recurse -File | Copy-Item -Destination binscope-windows/
          Get-ChildItem $env:CONDA_PREFIX -Filter "icu*.dll" -Recurse -File | Copy-Item -Destination binscope-windows/
          Get-ChildItem $env:CONDA_PREFIX -Filter "libjpeg*.dll" -Recurse -File | Copy-Item -Destination binscope-windows/
          Get-ChildItem $env:CONDA_PREFIX -Filter "libtiff*.dll" -Recurse -File | Copy-Item -Destination binscope-windows/
          Get-ChildItem $env:CONDA_PREFIX -Filter "libwebp*.dll" -Recurse -File | Copy-Item -Destination binscope-windows/
          Get-ChildItem $env:CONDA_PREFIX -Filter "pcre2*.dll" -Recurse -File | Copy-Item -Destination binscope-windows/
          Get-ChildItem $env:CONDA_PREFIX -Filter "zstd*.dll" -Recurse -File | Copy-Item -Destination binscope-windows/
          # Copy all DLLs from Qt bin directory
          Get-ChildItem "$env:CONDA_PREFIX/Library/bin" -Filter "*.dll" -File | Copy-Item -Destination binscope-windows/ -ErrorAction SilentlyContinue
          Compress-Archive -Path binscope-windows\* -DestinationPath binscope-${{ needs.get-version.outputs.version }}-windows-x64.zip

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: binscope-${{ needs.get-version.outputs.version }}-windows-x64.zip

  release:
    needs: [get-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.get-version.outputs.version }}
          name: BinScope v${{ needs.get-version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/binscope-windows-x64/*.zip
            artifacts/binscope-linux-x64/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}